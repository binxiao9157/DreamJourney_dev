services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3100:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: mirror.ccs.tencentyun.com/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dreamjourney
      POSTGRES_USER: dreamjourney
      POSTGRES_PASSWORD: dreamjourney
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dreamjourney -d dreamjourney"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: mirror.ccs.tencentyun.com/library/redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
